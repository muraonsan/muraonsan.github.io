<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>muraon Website</title>
    <link rel="stylesheet" type="text/css" href="style.css">
    <style>
      /* Style for the menu bar */
      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: rgb(140, 233, 233);
        padding: 10px;
      }

      /* Style for the menu items */
      nav ul {
        display: flex;
        list-style-type: none;
        margin: 0;
        padding: 0;
      }

      nav li {
        margin: 0 10px;
      }

      nav a {
        text-decoration: none;
        color: black;
      }

      /* Style for the image and text */
      nav .right {
        display: flex;
        align-items: center;
      }

      nav .right img {
        height: 30px;
        margin-right: 10px;
      }

    </style>
  </head>
  <body>
    <nav>
      <h1 style="font-size: 20px; color: blue;">MURAON WEB</h1>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
      <div class="right">
        <img src="images/logo.png" alt="Logo">
        <p style="color: rgb(3, 97, 35);">A MENBER OF Paradox Chat</p>
      </div>
    </nav>

    <div style="text-align:center;">
      <p style="font-size: 20px;" class="text">WELCOME TO MY SITE!</p>
    </div>

  </body>
</html>
