<!DOCTYPE html>

<head>

<style>
    nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: hsla(0, 90%, 12%, 0.842);
        padding: 10px;
      }

      /* Style for the menu items */
      nav ul {
        display: flex;
        list-style-type: none;
        margin: 0;
        padding: 0;
      }

      nav li {
        margin: 0 18px;
      }

      nav a {
        text-decoration: none;
        color: rgb(255, 255, 255);
      }

      /* Style for the image and text */
      nav .right {
        display: flex;
        align-items: center;
      }

      nav .right img {
        height: 30px;
        margin-right: 10px;
      }
.class {
cursor: pointer;
border: 1px solid #ccc;
padding: 10px;
margin: 5px;
}
.notes {
display: none;
padding: 10px;
border: 1px solid #ddd;
background-color: #f9f9f9;
}
</style>
<script>
function toggleNotes(classId) {
var notes = document.getElementById('notes-' + classId);
notes.style.display = notes.style.display === 'none' ? 'block' : 'none';
}
</script>
</head>
<body>
    <nav>

          <li><a href="https://muraonsan.github.io/other.html">Other</a></li>
        </ul>
      </nav>
      
      <div style="text-align:center;">
        <p style="font-size: 15px; font-family: Yomogi" class="text">バーが開かない場合は、バーの中央辺りをクリックしてください</p>
      </div>

<div class="class" onclick="toggleNotes('esports')">e-スポーツ同好会</div>
<div class="notes" id="notes-esports">
  <div style="text-align:center;">
    <p style="font-size: 10px; font-family: Yomogi" class="text">Note-ID:esports</p>

</div>
