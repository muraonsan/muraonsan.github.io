    <script>
       

        // キーコンビネーションを保持する配列
        const konamiCode = ["ArrowUp", "ArrowUp", "ArrowDown", "ArrowDown", "ArrowLeft", "ArrowRight", "ArrowLeft", "ArrowRight", "b", "a"];
        let enteredKeys = [];

        // キーボードのキーが押されたときのイベントハンドラ
        document.addEventListener("keydown", function(event) {
            enteredKeys.push(event.key);

            // 入力されたキーがキーコンビネーションと一致するか確認
            if (enteredKeys.toString() === konamiCode.toString()) {
                // 一致した場合、隠しページに転送
                window.location.href = "https://muraonsan.github.io/time.html"; // 隠しページのURLに置き換えてください

        });
